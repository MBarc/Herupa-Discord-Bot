<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in · Herupa</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='8' r='4' fill='%23FFB7C5'/%3E%3Ccircle cx='8' cy='12' r='4' fill='%23F797AC'/%3E%3Ccircle cx='16' cy='12' r='4' fill='%23F797AC'/%3E%3Ccircle cx='10' cy='16' r='4' fill='%23FFB7C5'/%3E%3Ccircle cx='14' cy='16' r='4' fill='%23FFCFD9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/herupa.css">
</head>
<body class="login-body">
<div class="petals" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>
<main class="login-wrap">
  <form class="login-card" method="post" action="/login">
    <img src="https://cdn.discordapp.com/avatars/643562852741021707/55f883fbbd65232460042ea2826dfea1.png?size=128" alt="Herupa" class="login-avatar">
    <h1>Herupa's control room</h1>
    <p class="login-sub">ヘルパ · the helper of Chill Club</p>
    {% if err %}<div class="flash flash-err" role="alert">{{ err }}</div>{% endif %}
    <label for="password">Admin password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
    <button type="submit" class="btn btn-primary btn-wide">Log in</button>
  </form>
</main>
<svg class="login-scene" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
  <circle cx="1150" cy="70" r="46" fill="#9CA0B4" opacity=".85"/>
  <path d="M0 250 Q 360 190 720 235 T 1440 220 V 360 H 0 Z" fill="#3B3E50"/>
  <path d="M0 300 Q 480 250 1440 292 V 360 H 0 Z" fill="#2F3142"/>
  <g>
    <rect x="216" y="150" width="14" height="120" rx="7" fill="#463A44"/>
    <path d="M223 150 L 260 120" stroke="#463A44" stroke-width="9" stroke-linecap="round"/>
    <circle cx="224" cy="110" r="52" fill="#F2A9BB"/>
    <circle cx="184" cy="132" r="36" fill="#F8C8D4"/>
    <circle cx="264" cy="130" r="34" fill="#FDD9E2"/>
    <circle cx="238" cy="76" r="30" fill="#FDE3EA"/>
  </g>
  <g>
    <rect x="1052" y="196" width="11" height="92" rx="5" fill="#463A44"/>
    <circle cx="1057" cy="168" r="40" fill="#F2A9BB"/>
    <circle cx="1026" cy="186" r="27" fill="#F8C8D4"/>
    <circle cx="1090" cy="184" r="26" fill="#FDD9E2"/>
  </g>
</svg>
</body>
</html>
